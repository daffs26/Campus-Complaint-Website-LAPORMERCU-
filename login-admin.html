<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin - #LAPORMERCU</title>
  <script src="https://cdn.tailwindcss.com/3"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="login-admin.css"/>
  <style>
    .admin-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      position: relative;
      overflow: hidden;
    }
    .deco {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      filter: blur(40px);
    }
    .glass-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 32px;
    }
    .input-admin {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 12px 12px 12px 40px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .input-admin::placeholder { color: rgba(147,197,253,0.8); }
    .input-admin:focus { border-color: rgba(255,255,255,0.6); box-shadow: 0 0 0 3px rgba(255,255,255,0.15); }
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }
    .btn-admin {
      width: 100%;
      background: white;
      color: #1d4ed8;
      font-weight: 700;
      font-size: 15px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-admin:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.25); transform: translateY(-1px); }
    .error-box {
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(252,165,165,0.3);
      color: #fecaca;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .demo-box {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 20px;
    }
    .label-admin {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(191,219,254,1);
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
<div class="admin-bg">
  <!-- Dekorasi -->
  <div class="deco" style="width:260px;height:260px;top:-40px;left:-40px;"></div>
  <div class="deco" style="width:200px;height:200px;bottom:-40px;right:-40px;"></div>

  <div style="width:100%;max-width:420px;position:relative;z-index:10;">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:16px;">
        <div style="width:42px;height:42px;background:rgba(255,255,255,0.2);border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:22px;color:white;">#LAPORMERCU</span>
      </a>
      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:26px;font-weight:800;color:white;margin:0 0 6px;">Login Administrator</h1>
      <p style="color:rgba(147,197,253,1);font-size:14px;margin:0;">Masuk untuk mengelola laporan pengaduan</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card">
      <!-- Error -->
      <div id="errorMsg" class="error-box">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span id="errorText">Username atau password salah.</span>
      </div>

      <!-- Username -->
      <div style="margin-bottom:20px;">
        <label class="label-admin">Username</label>
        <div style="position:relative;">
          <div class="input-icon">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <input id="username" type="text" placeholder="Masukkan username admin" class="input-admin"/>
        </div>
      </div>

      <!-- Password -->
      <div style="margin-bottom:28px;">
        <label class="label-admin">Password</label>
        <div style="position:relative;">
          <div class="input-icon">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <input id="password" type="password" placeholder="Masukkan password" class="input-admin" style="padding-right:44px;"/>
          <button type="button" onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- Tombol -->
      <button onclick="handleLogin()" class="btn-admin">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        Masuk sebagai Admin
      </button>

      <!-- Demo -->
      <div class="demo-box">
        <p style="font-size:11px;font-weight:600;color:rgba(147,197,253,1);margin:0 0 4px;">💡 Demo Login</p>
        <p style="font-size:12px;color:rgba(219,234,254,1);margin:0;">
          Username: <span style="font-family:monospace;font-weight:700;">admin</span>
          &nbsp;|&nbsp;
          Password: <span style="font-family:monospace;font-weight:700;">admin123</span>
        </p>
      </div>
    </div>

    <!-- Link bawah -->
    <div style="text-align:center;margin-top:20px;">
      <p style="font-size:14px;color:rgba(147,197,253,1);margin:0 0 8px;">
        Kamu seMercu?
        <a href="login-user.html" style="color:white;font-weight:600;text-decoration:none;margin-left:4px;">Login sebagai Mahasiswa →</a>
      </p>
      <a href="index.html" style="font-size:12px;color:rgba(147,197,253,0.8);text-decoration:none;">← Kembali ke Beranda</a>
    </div>

  </div>
</div>


  <script src="main.js"></script>
  <script src="login-admin.js"></script>
</body>
</html>
