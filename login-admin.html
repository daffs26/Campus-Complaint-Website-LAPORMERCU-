<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin - #LAPORMERCU</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="login-admin.css"/>
</head>
<body>
<div class="admin-bg">
  <!-- Dekorasi -->
  <div class="deco" style="width:260px;height:260px;top:-40px;left:-40px;"></div>
  <div class="deco" style="width:200px;height:200px;bottom:-40px;right:-40px;"></div>

  <div class="admin-container">

    <!-- Logo -->
    <div class="admin-logo-section">
      <a href="index.html" class="admin-logo-link">
        <div class="admin-logo-icon">
          <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <span class="admin-logo-text">#LAPORMERCU</span>
      </a>
      <h1 class="admin-title">Login Administrator</h1>
      <p class="admin-subtitle">Masuk untuk mengelola laporan pengaduan</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card">
      <!-- Error -->
      <div id="errorMsg" class="error-box">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span id="errorText">Username atau password salah.</span>
      </div>

      <!-- Username -->
      <div class="admin-field">
        <label class="label-admin">Username</label>
        <div class="admin-input-wrap">
          <div class="input-icon">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <input id="username" type="text" placeholder="Masukkan username admin" class="input-admin"/>
        </div>
      </div>

      <!-- Password -->
      <div class="admin-field" style="margin-bottom:28px;">
        <label class="label-admin">Password</label>
        <div class="admin-input-wrap">
          <div class="input-icon">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <input id="password" type="password" placeholder="Masukkan password" class="input-admin" style="padding-right:44px;"/>
          <button type="button" onclick="togglePassword()" class="admin-eye-btn">
            <svg width="16" height="16" fill="none" stroke="rgba(147,197,253,1)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <!-- Tombol -->
      <button onclick="handleLogin()" class="btn-admin">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        Masuk sebagai Admin
      </button>

      <!-- Demo -->
      <div class="demo-box">
        <p class="demo-label">💡 Demo Login</p>
        <p class="demo-text">
          Username: <span class="demo-mono">admin</span>
          &nbsp;|&nbsp;
          Password: <span class="demo-mono">admin123</span>
        </p>
      </div>
    </div>

    <!-- Link bawah -->
    <div class="admin-footer-links">
      <p class="admin-footer-text">
        Kamu mahasiswa?
        <a href="login-user.html" class="admin-footer-link">Login sebagai Mahasiswa →</a>
      </p>
      <a href="index.html" class="admin-footer-back">← Kembali ke Beranda</a>
    </div>

  </div>
</div>

  <script src="main.js"></script>
  <script src="login-admin.js"></script>
</body>
</html>
